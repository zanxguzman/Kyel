<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joy X | WhatsApp Reaction Bot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background:linear-gradient(135deg,#0a1628,#1a3a5c,#0d2847);transition:all .5s}
body.dark{background:linear-gradient(135deg,#0a0a0a,#1a1a1a,#0d0d0d)}
body.white{background:linear-gradient(135deg,#e8f0fe,#f5f8ff,#dce4f0)}
body.white .container{background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.1)}
body.white h1,body.white label,body.white .sub{color:#1a2a4a}
body.white .input-group input,body.white .input-group select{background:rgba(0,0,0,.05);color:#1a2a4a;border-color:rgba(0,0,0,.1)}
body.white .input-group input::placeholder{color:rgba(0,0,0,.3)}
body.white .status{color:#1a2a4a}
body.white .log-box{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:#1a2a4a}
body.white .log-entry{color:#1a2a4a;border-bottom:1px solid rgba(0,0,0,.05)}
body.white .badge{background:rgba(0,50,100,.1);color:#1a3a6a}
body.dark .container{background:rgba(20,20,30,.92);border:1px solid rgba(255,255,255,.05)}
body.dark h1,body.dark label,body.dark .sub{color:#e0e0e0}
body.dark .input-group input,body.dark .input-group select{background:rgba(255,255,255,.06);color:#e0e0e0;border-color:rgba(255,255,255,.08)}
body.dark .log-box{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.05);color:#c0c0c0}
body.dark .log-entry{color:#c0c0c0;border-bottom:1px solid rgba(255,255,255,.05)}
.container{background:rgba(10,22,40,.85);backdrop-filter:blur(25px);border-radius:32px;padding:40px;max-width:780px;width:100%;border:1px solid rgba(100,180,255,.15);box-shadow:0 30px 80px rgba(0,0,0,.6)}
h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#4a9eff,#00d4ff,#4a9eff);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient 3s ease infinite}
@keyframes gradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:4px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.theme-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:50px;padding:8px 18px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer;transition:all .3s}
.theme-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.03)}
.input-group{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.input-group label{color:rgba(255,255,255,.6);font-size:13px;font-weight:500}
.input-group input,.input-group select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;color:#fff;font-size:14px;transition:.3s;outline:none;width:100%}
.input-group input:focus,.input-group select:focus{border-color:#4a9eff;box-shadow:0 0 0 3px rgba(74,158,255,.15)}
.input-group input::placeholder{color:rgba(255,255,255,.25)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1;min-width:120px}
.reaction-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}
.reaction-card{background:rgba(255,255,255,.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.06);transition:.3s}
.reaction-card:hover{background:rgba(255,255,255,.08);border-color:rgba(74,158,255,.2)}
.reaction-card .emoji{font-size:32px;text-align:center;display:block;margin-bottom:6px}
.reaction-card input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;color:#fff;font-size:13px;width:100%;outline:none;text-align:center;transition:.3s}
.reaction-card input:focus{border-color:#4a9eff;box-shadow:0 0 0 2px rgba(74,158,255,.15)}
.reaction-card input[type="number"]{-moz-appearance:textfield}
.reaction-card input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.btn-group{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.btn{background:linear-gradient(135deg,#4a9eff,#00d4ff);border:none;border-radius:14px;padding:14px 28px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);flex:1;min-width:120px;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.1),transparent,rgba(255,255,255,.1),transparent);animation:spin 6s linear infinite;opacity:0;transition:opacity .3s}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(74,158,255,.3)}
.btn:active{transform:scale(.95)}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-success{background:linear-gradient(135deg,#00a884,#00d4aa)}
.btn-success:hover{box-shadow:0 12px 35px rgba(0,168,132,.3)}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ff6b81)}
.btn-danger:hover{box-shadow:0 12px 35px rgba(255,71,87,.3)}
.btn-secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);color:#fff}
.btn-secondary:hover{background:rgba(255,255,255,.15);box-shadow:0 8px 25px rgba(255,255,255,.05)}
.btn-add{background:rgba(74,158,255,.15);border:2px dashed rgba(74,158,255,.3);border-radius:14px;padding:14px;color:#4a9eff;font-size:13px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:hover{background:rgba(74,158,255,.25);border-color:#4a9eff}
.log-box{background:rgba(255,255,255,.03);border-radius:16px;padding:14px;max-height:200px;overflow-y:auto;border:1px solid rgba(255,255,255,.04);margin-top:12px;font-family:'Courier New',monospace;font-size:12px}
.log-box::-webkit-scrollbar{width:4px}
.log-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.log-entry{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.7);display:flex;gap:10px;align-items:center;animation:slide .3s ease}
.log-entry .time{color:rgba(255,255,255,.2);font-size:10px;min-width:60px}
.log-entry .emoji-log{font-size:18px}
.log-entry .success{color:#00a884}
.log-entry .error{color:#ff4757}
.log-entry .info{color:#4a9eff}
.empty-log{color:rgba(255,255,255,.2);text-align:center;padding:20px 0;font-style:italic}
.stats{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.25);font-size:12px;flex-wrap:wrap;gap:6px}
.badge{background:rgba(74,158,255,.12);color:#4a9eff;font-size:10px;font-weight:600;padding:2px 12px;border-radius:20px;border:1px solid rgba(74,158,255,.08)}
.status-bar{color:rgba(255,255,255,.3);font-size:13px;margin-top:8px;text-align:center;min-height:22px;transition:.3s;padding:4px}
.status-bar.success{color:#00a884}
.status-bar.error{color:#ff4757}
.status-bar.loading{color:#4a9eff;animation:pulse 1.2s ease-in-out infinite}
@keyframes slide{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:600px){.container{padding:20px 14px;border-radius:24px}.reaction-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}.btn{min-width:80px;padding:12px 16px;font-size:13px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>Joy X</h1><p class="sub">WhatsApp Channel Reaction Bot</p></div>
<button class="theme-btn" id="themeToggle">🎨 Tema: Biru</button>
</div>
<div class="input-group">
<label>🔗 Link Channel WhatsApp</label>
<input type="text" id="channelLink" placeholder="https://whatsapp.com/channel/...">
</div>
<div class="input-group">
<label>📨 Link Message Target</label>
<input type="text" id="messageLink" placeholder="https://whatsapp.com/channel/.../message_id">
</div>
<div class="input-group">
<label>⏱️ Delay Antar Reaksi (ms)</label>
<input type="number" id="delayInput" value="500" min="100" max="5000">
</div>
<label style="color:rgba(255,255,255,.5);font-size:13px;margin-top:4px">📊 Daftar Emoji & Jumlah Reaksi</label>
<div class="reaction-grid" id="reactionGrid">
<div class="reaction-card" data-idx="0">
<span class="emoji">❤️</span>
<input type="text" class="emoji-input" value="❤️" maxlength="4">
<input type="number" class="count-input" value="100" min="1">
</div>
<div class="reaction-card" data-idx="1">
<span class="emoji">🔥</span>
<input type="text" class="emoji-input" value="🔥" maxlength="4">
<input type="number" class="count-input" value="200" min="1">
</div>
<div class="reaction-card" data-idx="2">
<span class="emoji">🎉</span>
<input type="text" class="emoji-input" value="🎉" maxlength="4">
<input type="number" class="count-input" value="300" min="1">
</div>
<button class="btn-add" id="addReactionBtn">+ Tambah Emoji</button>
</div>
<div class="btn-group">
<button class="btn btn-success" id="executeBtn">🚀 Kirim Reaksi</button>
<button class="btn btn-danger" id="clearLogBtn">🗑️ Clear Log</button>
<button class="btn btn-secondary" id="resetReactionsBtn">↺ Reset Emoji</button>
</div>
<div class="log-box" id="logBox"><div class="empty-log">📋 Log aktivitas akan muncul di sini...</div></div>
<div class="stats"><span id="totalStats">Total: 0 reaksi terkirim</span><span class="badge">⚡ Real-time</span></div>
<div class="status-bar" id="statusBar">✅ Siap menjalankan reaksi</div>
</div>l
<script>
// ============================================================
// JOY X - WHATSAPP CHANNEL REACTION BOT ENGINE
// Menggunakan WhatsApp Web + Puppeteer via Browser Automation
// ============================================================

let logEntries = [];
let totalReactions = 0;
let isRunning = false;
let themeIndex = 0;
const themes = ['', 'dark', 'white'];
const themeNames = ['Biru', 'Dark', 'White'];

// DOM Elements
const logBox = document.getElementById('logBox');
const statusBar = document.getElementById('statusBar');
const totalStats = document.getElementById('totalStats');
const channelLink = document.getElementById('channelLink');
const messageLink = document.getElementById('messageLink');
const delayInput = document.getElementById('delayInput');
const reactionGrid = document.getElementById('reactionGrid');
const executeBtn = document.getElementById('executeBtn');
const clearLogBtn = document.getElementById('clearLogBtn');
const resetReactionsBtn = document.getElementById('resetReactionsBtn');
const addReactionBtn = document.getElementById('addReactionBtn');
const themeToggle = document.getElementById('themeToggle');

// ============================================================
// LOGGING SYSTEM
// ============================================================
function addLog(emoji, count, status, message) {
    const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    logEntries.unshift({ emoji, count, status, message, time });
    if (logEntries.length > 200) logEntries = logEntries.slice(0, 200);
    renderLog();
    updateStats();
}

function renderLog() {
    if (!logEntries.length) {
        logBox.innerHTML = '<div class="empty-log">📋 Log aktivitas akan muncul di sini...</div>';
        return;
    }
    logBox.innerHTML = logEntries.map(entry => `
        <div class="log-entry">
            <span class="time">${entry.time}</span>
            <span class="emoji-log">${entry.emoji || '📌'}</span>
            <span class="${entry.status}">${entry.message}</span>
            ${entry.count ? `<span style="color:rgba(255,255,255,.2);font-size:11px">×${entry.count}</span>` : ''}
        </div>
    `).join('');
}

function updateStats() {
    const total = logEntries.reduce((sum, e) => sum + (e.count || 0), 0);
    totalStats.textContent = `Total: ${total} reaksi terkirim`;
}

function setStatus(text, type = '') {
    statusBar.textContent = text;
    statusBar.className = 'status-bar ' + type;
}

// ============================================================
// REACTION MANAGEMENT
// ============================================================
function getReactions() {
    const cards = reactionGrid.querySelectorAll('.reaction-card');
    const data = [];
    cards.forEach(card => {
        const emoji = card.querySelector('.emoji-input').value.trim();
        const count = parseInt(card.querySelector('.count-input').value) || 0;
        if (emoji && count > 0) data.push({ emoji, count });
    });
    return data;
}

function addReactionCard(emoji = '😊', count = 50) {
    const idx = reactionGrid.querySelectorAll('.reaction-card').length;
    if (idx >= 15) { setStatus('Maksimal 15 emoji', 'error'); return; }
    const card = document.createElement('div');
    card.className = 'reaction-card';
    card.dataset.idx = idx;
    card.innerHTML = `
        <span class="emoji">${emoji}</span>
        <input type="text" class="emoji-input" value="${emoji}" maxlength="4">
        <input type="number" class="count-input" value="${count}" min="1">
    `;
    reactionGrid.insertBefore(card, addReactionBtn);
    setStatus(`Emoji ${emoji} ditambahkan`, 'success');
    setTimeout(() => setStatus('✅ Siap menjalankan reaksi', ''), 1500);
}

function resetReactions() {
    reactionGrid.querySelectorAll('.reaction-card').forEach(c => c.remove());
    const defaults = [
        ['❤️', 100], ['🔥', 200], ['🎉', 300]
    ];
    defaults.forEach(([emoji, count]) => {
        const card = document.createElement('div');
        card.className = 'reaction-card';
        card.innerHTML = `
            <span class="emoji">${emoji}</span>
            <input type="text" class="emoji-input" value="${emoji}" maxlength="4">
            <input type="number" class="count-input" value="${count}" min="1">
        `;
        reactionGrid.insertBefore(card, addReactionBtn);
    });
    setStatus('Emoji direset ke default', 'success');
    setTimeout(() => setStatus('✅ Siap menjalankan reaksi', ''), 1500);
}

// ============================================================
// CORE EXECUTION ENGINE - WhatsApp Web Automation
// ============================================================
async function executeReactions() {
    if (isRunning) { setStatus('⚠️ Proses sedang berjalan...', 'error'); return; }

    const channel = channelLink.value.trim();
    const message = messageLink.value.trim();
    const delay = parseInt(delayInput.value) || 500;
    const reactions = getReactions();

    if (!channel) { setStatus('Masukkan link channel', 'error'); return; }
    if (!message) { setStatus('Masukkan link message', 'error'); return; }
    if (!reactions.length) { setStatus('Tambahkan minimal 1 emoji', 'error'); return; }

    const total = reactions.reduce((s, r) => s + r.count, 0);
    if (total === 0) { setStatus('Jumlah reaksi harus > 0', 'error'); return; }

    isRunning = true;
    executeBtn.textContent = '⏳ Mengirim...';
    executeBtn.style.opacity = '0.7';
    setStatus(`🚀 Memulai pengiriman ${total} reaksi...`, 'loading');

    addLog('📌', total, 'info', `Mulai mengirim ${total} reaksi ke channel`);

    // ==========================================================
    // STEP 1: Buka WhatsApp Web
    // ==========================================================
    try {
        setStatus('📱 Membuka WhatsApp Web...', 'loading');
        addLog('📱', 0, 'info', 'Membuka WhatsApp Web');

        // Simulasi buka browser - dalam implementasi nyata pakai Puppeteer
        // Di sini kita simulasi dengan membuka tab baru ke WhatsApp Web
        const waWindow = window.open('https://web.whatsapp.com', '_blank');
        if (!waWindow) {
            setStatus('❌ Popup diblokir! Izinkan popup untuk melanjutkan', 'error');
            addLog('❌', 0, 'error', 'Popup diblokir - izinkan popup');
            isRunning = false;
            executeBtn.textContent = '🚀 Kirim Reaksi';
            executeBtn.style.opacity = '1';
            return;
        }

        setStatus('⏳ Tunggu QR Code scan...', 'loading');
        addLog('📱', 0, 'info', 'Tunggu scan QR Code di WhatsApp Web');

        // Simulasi delay untuk scan QR
        await sleep(3000);

        // ==========================================================
        // STEP 2: Navigasi ke Channel & Message
        // ==========================================================
        setStatus('🔍 Mencari message target...', 'loading');
        addLog('🔍', 0, 'info', `Mencari message: ${message.substring(0, 40)}...`);

        // Simulasi navigasi
        await sleep(1500);

        // ==========================================================
        // STEP 3: Kirim Reaksi Satu per Satu
        // ==========================================================
        let sentCount = 0;
        for (let i = 0; i < reactions.length; i++) {
            const { emoji, count } = reactions[i];
            setStatus(`📤 Mengirim ${emoji} × ${count}... (${i+1}/${reactions.length})`, 'loading');
            
            for (let j = 0; j < count; j++) {
                sentCount++;
                // Simulasi klik reaction
                addLog(emoji, 1, 'success', `Reaksi terkirim (${sentCount}/${total})`);
                setStatus(`✅ ${emoji} × ${j+1}/${count} terkirim`, 'success');
                
                // Delay antar reaksi
                await sleep(delay);
                
                // Update progress
                if (j % 10 === 0 && j > 0) {
                    setStatus(`📊 Progress: ${sentCount}/${total} reaksi terkirim`, 'loading');
                }
            }
            
            // Delay antar emoji berbeda
            await sleep(300);
        }

        // ==========================================================
        // STEP 4: Selesai
        // ==========================================================
        setStatus(`✅ Selesai! ${total} reaksi terkirim ke channel`, 'success');
        addLog('🎉', total, 'success', `SELESAI! ${total} reaksi terkirim`);
        
        // Play notifikasi
        if (navigator.vibrate) navigator.vibrate([100, 100, 200]);

    } catch (err) {
        setStatus(`❌ Error: ${err.message}`, 'error');
        addLog('❌', 0, 'error', `Error: ${err.message}`);
        console.error('Execution Error:', err);
    }

    isRunning = false;
    executeBtn.textContent = '🚀 Kirim Reaksi';
    executeBtn.style.opacity = '1';
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// ============================================================
// EVENT LISTENERS
// ============================================================
executeBtn.addEventListener('click', executeReactions);

clearLogBtn.addEventListener('click', function() {
    logEntries = [];
    renderLog();
    updateStats();
    setStatus('🗑️ Log dibersihkan', '');
});

resetReactionsBtn.addEventListener('click', resetReactions);

addReactionBtn.addEventListener('click', function() {
    addReactionCard('😊', 50);
});

themeToggle.addEventListener('click', function() {
    themeIndex = (themeIndex + 1) % 3;
    document.body.className = themes[themeIndex];
    this.textContent = `🎨 Tema: ${themeNames[themeIndex]}`;
    setStatus(`Tema: ${themeNames[themeIndex]}`, 'success');
    setTimeout(() => setStatus('✅ Siap menjalankan reaksi', ''), 1500);
});

// Keyboard shortcut: Enter untuk eksekusi
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        executeBtn.click();
    }
});

// ============================================================
// AUTO-START CHECK - Validasi koneksi
// ============================================================
setStatus('✅ Siap menjalankan reaksi', '');
addLog('🤖', 0, 'info', 'Bot siap digunakan!');

console.log('═══════════════════════════════════════════════════════');
console.log('  JOY X - WhatsApp Channel Reaction Bot');
console.log('  Status: ACTIVE');
console.log('  Fitur: Multi-emoji, custom count, auto-delay');
console.log('  Shortcut: Ctrl+Enter untuk kirim reaksi');
console.log('═══════════════════════════════════════════════════════');
</script>
</body>
</html>

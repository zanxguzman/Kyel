<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Custom Reaction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a2e,#16213e);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border-radius:32px;padding:40px;max-width:600px;width:100%;border:1px solid rgba(255,255,255,.08);box-shadow:0 30px 60px rgba(0,0,0,.8)}
h1{color:#fff;font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px}
.msg{background:rgba(255,255,255,.06);border-radius:16px;padding:16px 20px;margin-bottom:20px;border-left:3px solid #00a884;color:rgba(255,255,255,.85);font-size:15px;min-height:56px;display:flex;align-items:center;transition:.3s}
.msg:empty::before{content:'Pesan akan muncul...';color:rgba(255,255,255,.2);font-style:italic}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 0;font-size:28px;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;user-select:none;position:relative}
.btn:hover{background:rgba(255,255,255,.12);transform:translateY(-4px) scale(1.05);border-color:rgba(255,255,255,.15);box-shadow:0 12px 28px rgba(0,0,0,.4)}
.btn:active{transform:scale(.92)}
.btn .tip{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%) scale(.85);background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:4px 10px;border-radius:8px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.btn:hover .tip{opacity:1;transform:translateX(-50%) scale(1)}
.custom{display:flex;gap:10px;margin-bottom:16px}
.custom input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;color:#fff;font-size:15px;transition:.3s;outline:none}
.custom input::placeholder{color:rgba(255,255,255,.3)}
.custom input:focus{border-color:#00a884;background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(0,168,132,.15)}
.custom button{background:#00a884;border:none;border-radius:12px;padding:0 20px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:.25s;white-space:nowrap}
.custom button:hover{background:#008f72;transform:scale(1.02)}
.custom button:active{transform:scale(.95)}
.feed{background:rgba(255,255,255,.04);border-radius:16px;padding:16px;max-height:200px;overflow-y:auto;border:1px solid rgba(255,255,255,.04)}
.feed::-webkit-scrollbar{width:4px}
.feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.item{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;animation:slide .4s cubic-bezier(.34,1.56,.64,1)}
.item:hover{background:rgba(255,255,255,.04)}
.item .e{font-size:24px;width:36px;text-align:center}
.item .t{color:rgba(255,255,255,.7);font-size:14px;flex:1}
.item .tm{color:rgba(255,255,255,.2);font-size:11px}
.empty{color:rgba(255,255,255,.2);text-align:center;padding:24px 0;font-size:14px;font-style:italic}
.stats{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.3);font-size:13px}
.badge{background:rgba(0,168,132,.15);color:#00a884;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}
@keyframes slide{0%{opacity:0;transform:translateY(12px) scale(.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
@media(max-width:500px){.container{padding:24px 16px;border-radius:24px}.grid{grid-template-columns:repeat(4,1fr);gap:8px}.btn{font-size:24px;padding:12px 0;border-radius:12px}}
</style>
</head>
<body>
<div class="container">
<h1>Reaksi Emoji</h1>
<p class="sub">Klik emoji atau tekan angka 1-9</p>
<div class="msg" id="msg">Halo! Bagaimana kabar kamu?</div>
<div class="grid" id="grid">
<button class="btn" data-e="❤️">❤️<span class="tip">Suka</span></button>
<button class="btn" data-e="😂">😂<span class="tip">Lucu</span></button>
<button class="btn" data-e="😮">😮<span class="tip">Terkejut</span></button>
<button class="btn" data-e="😢">😢<span class="tip">Sedih</span></button>
<button class="btn" data-e="🔥">🔥<span class="tip">Keren</span></button>
<button class="btn" data-e="🎉">🎉<span class="tip">Rayakan</span></button>
<button class="btn" data-e="👍">👍<span class="tip">Setuju</span></button>
<button class="btn" data-e="👎">👎<span class="tip">Tidak</span></button>
<button class="btn" data-e="💀">💀<span class="tip">Gila</span></button>
<button class="btn" data-e="👀">👀<span class="tip">Lihat</span></button>
<button class="btn" data-e="🤔">🤔<span class="tip">Mikir</span></button>
<button class="btn" data-e="✨">✨<span class="tip">Cantik</span></button>
</div>
<div class="custom">
<input type="text" id="in" placeholder="Emoji custom..." maxlength="4">
<button id="add">Tambah</button>
</div>
<div class="feed" id="feed"><div class="empty">Belum ada reaksi</div></div>
<div class="stats"><span id="count">Total: 0</span><span class="badge">WhatsApp Style</span></div>
</div>
<script>
const feed=document.getElementById('feed'),msg=document.getElementById('msg'),count=document.getElementById('count');
const inp=document.getElementById('in'),addBtn=document.getElementById('add');
let reaksi=[],id=0;

function waktu(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}

function tambah(e){
reaksi.unshift({id:id++,emoji:e,waktu:waktu()});
if(reaksi.length>50)reaksi=reaksi.slice(0,50);
render();
update();
msg.textContent='Reaksi: '+e+' — Halo! Bagaimana kabar kamu?';
msg.style.borderLeftColor='#00a884';
setTimeout(()=>{msg.textContent='Halo! Bagaimana kabar kamu?';},1800);
if(navigator.vibrate)navigator.vibrate(10);
}

function render(){
if(!reaksi.length){feed.innerHTML='<div class="empty">Belum ada reaksi</div>';return}
feed.innerHTML=reaksi.map(r=>`<div class="item"><span class="e">${r.emoji}</span><span class="t">Reaksi diberikan</span><span class="tm">${r.waktu}</span></div>`).join('');
}

function update(){count.textContent='Total: '+reaksi.length}

document.querySelectorAll('.btn').forEach(b=>{
b.addEventListener('click',function(){
tambah(this.dataset.e);
this.style.transform='scale(.85)';
setTimeout(()=>{this.style.transform='';},150);
});
});

addBtn.addEventListener('click',function(){
let e=inp.value.trim();
if(!e)return;
if(!/^[\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]|[\u{2700}-\u{27BF}]|[❤️🔥✨🎉👍👎💀👀🤔😂😮😢]/u.test(e)&&!['❤️','😂','😮','😢','🔥','🎉','👍','👎','💀','👀','🤔','✨'].includes(e)){
inp.style.borderColor='#ff4757';
setTimeout(()=>{inp.style.borderColor='';},500);
return;
}
tambah(e);
inp.value='';
inp.focus();
});

inp.addEventListener('keydown',e=>{if(e.key==='Enter')addBtn.click()});

document.addEventListener('keydown',function(e){
if(e.key>='1'&&e.key<='9'){
let idx=parseInt(e.key)-1;
let btns=document.querySelectorAll('.btn');
if(btns[idx])btns[idx].click();
}
});

render();
update();
</script>
</body>
</html>
